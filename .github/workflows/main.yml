name: Gotobi Trading Bot

on:
  schedule:
    # 日本時間 07:45〜07:55 (UTC 22:45〜22:55)
    - cron: '45,50,55 22 * * *'
    
    # 日本時間 08:00〜08:55 (UTC 23:00〜23:55)
    - cron: '*/5 23 * * *'
    
    # 日本時間 09:00〜09:50 (UTC 00:00〜00:50)
    - cron: '0,5,10,15,20,25,30,35,40,45,50 0 * * *'

  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
      - name: Run Gotobi Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python main.py
