name: Gotobi Trading Bot

on:
  schedule:
    # 1. 日本時間 07:45 (UTC 22:45 前日) -> 監視スタート
    - cron: '45 22 * * *'
    
    # 2. 日本時間 08:15 (UTC 23:15 前日) -> 押し目監視 ①
    - cron: '15 23 * * *'
    
    # 3. 日本時間 08:30 (UTC 23:30 前日) -> ★押し目監視 ②（追加！）
    - cron: '30 23 * * *'
    
    # 4. 日本時間 08:45 (UTC 23:45 前日) -> 押し目監視 ③
    - cron: '45 23 * * *'
    
    # 5. 日本時間 09:50 (UTC 00:50 当日) -> 決済通知 & 記帳
    - cron: '50 0 * * *'

  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests
      - name: Run Gotobi Bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python main.py
